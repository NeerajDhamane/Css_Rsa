<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Smart City Secure System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: rgba(23, 28, 40, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --accent-purple: #8b5cf6;
            --glass-blur: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: var(--glass-blur);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.5px; display: flex; align-items: center; gap: 0.75rem; }
        .logo i { color: var(--accent-blue); }
        .logo span { color: var(--accent-blue); }

        nav { display: flex; gap: 1.5rem; }
        nav a { text-decoration: none; color: var(--text-secondary); font-weight: 500; font-size: 0.9rem; transition: color 0.2s; display: flex; align-items: center; gap: 0.5rem; }
        nav a:hover, nav a.active { color: var(--text-primary); }
        nav a.active { color: var(--accent-blue); }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
        }

        @media (max-width: 1024px) { main { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 1rem; backdrop-filter: var(--glass-blur); overflow: hidden; margin-bottom: 2rem; }
        .card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .card-header h2 { font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 0.75rem; }
        .card-body { padding: 1.5rem; }

        .field { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }

        .device-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }

        .device-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 1rem; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; text-align: left; }
        .device-btn:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.2); }
        .device-btn.active { background: rgba(59, 130, 246, 0.1); border-color: var(--accent-blue); color: var(--text-primary); }
        .device-btn i { display: block; font-size: 1.25rem; margin-bottom: 0.5rem; }

        textarea, input { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-color); border-radius: 0.75rem; color: var(--text-primary); padding: 0.75rem 1rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
        textarea:focus, input:focus { border-color: var(--accent-blue); }

        .btn-primary { width: 100%; background: var(--accent-blue); color: white; border: none; border-radius: 0.75rem; padding: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.1s, background 0.2s; display: flex; justify-content: center; align-items: center; gap: 0.75rem; }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:active { transform: scale(0.98); }

        .attack-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
        .attack-btn { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--accent-red); padding: 0.75rem; border-radius: 0.5rem; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; }
        .attack-btn:hover { background: rgba(239, 68, 68, 0.2); }
        .attack-btn.active { background: var(--accent-red); color: white; }

        .step { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-secondary); background: rgba(0,0,0,0.3); padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 0.5rem; border-left: 3px solid var(--accent-purple); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); display: inline-block; margin-right: 0.5rem; box-shadow: 0 0 10px var(--accent-green); animation: pulse 2s infinite; }

        #statusMsg { font-size: 0.8rem; margin-top: 1rem; padding: 0.75rem; border-radius: 0.5rem; display: none; }
        .success { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .error { background: rgba(239, 68, 68, 0.1); color: var(--accent-red); border: 1px solid var(--accent-red); }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-shield-halved"></i>
            SECURE-CITY <span>COMM</span>
        </div>
        <nav>
            <a href="/" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="/verify.html"><i class="fas fa-list-check"></i> System Logs</a>
        </nav>
    </header>

    <main>
        <section>
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-satellite-dish"></i> IoT Message Composer</h2>
                    <span id="sessionStatus"><span class="status-dot"></span> System Ready</span>
                </div>
                <div class="card-body">
                    <div class="field">
                        <label>1. Select IoT Device</label>
                        <div class="device-selector" id="deviceList"></div>
                    </div>

                    <div class="field">
                        <label>2. Secure Payload</label>
                        <textarea id="messageInput" placeholder="Enter message from IoT device (e.g., Traffic Flow: 85%)" rows="3"></textarea>
                    </div>

                    <div class="field">
                        <label>3. Shared Secret (HMAC)</label>
                        <input type="text" id="sharedSecret" value="smart_city_v2_secret">
                    </div>

                    <button class="btn-primary" id="sendBtn">
                        <i class="fas fa-paper-plane"></i> Sign, Encrypt & Transmit
                    </button>

                    <div id="statusMsg"></div>
                </div>
            </div>

            <div class="card" id="eduCard" style="display:none;">
                <div class="card-header">
                    <h2><i class="fas fa-book-open"></i> Cryptographic Pipeline</h2>
                </div>
                <div class="card-body">
                    <div id="stepsList"></div>
                </div>
            </div>
        </section>

        <aside>
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-bug"></i> Attack Simulation</h2>
                </div>
                <div class="card-body">
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1rem;">
                        Intentionally sabotage the security protocol to test server-side and client-side verification.
                    </p>
                    <div class="attack-grid">
                        <button class="attack-btn" onclick="toggleAttack(this, 'tamper')">
                            <i class="fas fa-edit"></i> Tamper with Data (Integrity)
                        </button>
                        <button class="attack-btn" onclick="toggleAttack(this, 'replay')">
                            <i class="fas fa-rotate-right"></i> Replay Attack (Duplicate)
                        </button>
                        <button class="attack-btn" onclick="toggleAttack(this, 'spoof')">
                            <i class="fas fa-user-secret"></i> Spoof Device (Authentication)
                        </button>
                        <button class="attack-btn" onclick="toggleAttack(this, 'expire')">
                            <i class="fas fa-clock"></i> Old Timestamp (Staleness)
                        </button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-key"></i> Device Key Pairs</h2>
                </div>
                <div class="card-body">
                    <div id="keyInfo" style="font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; color: var(--text-secondary);">
                        Select a device to view generated cryptographic keys.
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script src="/public/js/crypto-utils.js"></script>
    <script>
        let devices = [];
        let selectedDeviceId = null;
        let activeAttacks = { tamper: false, replay: false, spoof: false, expire: false };
        let lastSuccessPayload = null;

        window.addEventListener('load', async () => {
            await fetchDevices();
        });

        async function fetchDevices() {
            try {
                const res = await fetch('/api/devices');
                devices = await res.json();
                renderDevices();
            } catch (err) {
                console.error('Failed to fetch devices', err);
            }
        }

        function renderDevices() {
            const list = document.getElementById('deviceList');
            list.innerHTML = '';
            devices.forEach(d => {
                const btn = document.createElement('button');
                btn.className = 'device-btn';
                btn.innerHTML = `
                    <i class="fas ${getIcon(d.type)}"></i>
                    <strong>${d.name}</strong>
                    <small style="display:block;opacity:0.6">${d.id}</small>
                `;
                btn.onclick = () => selectDevice(d.id);
                list.appendChild(btn);
            });
        }

        function getIcon(type) {
            switch(type) {
                case 'TRAFFIC': return 'fa-traffic-light';
                case 'POLLUTION': return 'fa-smog';
                case 'ENVIRONMENT': return 'fa-cloud-sun';
                default: return 'fa-microchip';
            }
        }

        async function selectDevice(id) {
            selectedDeviceId = id;
            document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.device-btn').forEach(btn => {
                if (btn.querySelector('small').textContent === id) btn.classList.add('active');
            });

            const device = devices.find(d => d.id === id);

            if (typeof device.public_key_jwk === 'string' && device.public_key_jwk.startsWith('{')) {
                device.public_key_jwk = JSON.parse(device.public_key_jwk);
            }

            const keyDisplay = document.getElementById('keyInfo');
            const privBundleStr = localStorage.getItem(`priv_${device.id}`);
            const isNewFormat = device.public_key_jwk && device.public_key_jwk.enc && device.public_key_jwk.sig;

            // FIX: Only regenerate keys if BOTH the server key AND local private key are missing.
            // Previously using || caused key regeneration even when a private key existed,
            // which created a mismatch between the new public key and old signed logs.
            if (!isNewFormat && !privBundleStr) {
                keyDisplay.innerHTML = "Syncing/Upgrading security keys...";
                await setupKeyForDevice(device);
            } else if (!privBundleStr) {
                // Server has new format key but local private key is gone — must regenerate
                keyDisplay.innerHTML = "Regenerating lost private key...";
                await setupKeyForDevice(device);
            }

            keyDisplay.innerHTML = `
                <span style="color:var(--accent-purple)">RSA PUBLIC KEY BUNDLE (Active):</span><br>
                <small>Encryption Key: ${device.public_key_jwk.enc.n.substring(0, 30)}...</small><br>
                <small>Signing Key: ${device.public_key_jwk.sig.n.substring(0, 30)}...</small>
            `;
        }

        async function setupKeyForDevice(device) {
            const encKeyPair = await CryptoUtils.generateRSAKeyPair();
            const signKeyPair = await CryptoUtils.generateSigningKeyPair();

            const pubBundle = {
                enc: await CryptoUtils.exportKey(encKeyPair.publicKey),
                sig: await CryptoUtils.exportKey(signKeyPair.publicKey)
            };

            await fetch('/api/update-keys', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ device_id: device.id, public_key_jwk: pubBundle })
            });

            device.public_key_jwk = pubBundle;

            const privBundle = {
                enc: await CryptoUtils.exportKey(encKeyPair.privateKey),
                sig: await CryptoUtils.exportKey(signKeyPair.privateKey)
            };
            localStorage.setItem(`priv_${device.id}`, JSON.stringify(privBundle));
        }

        function toggleAttack(btn, type) {
            activeAttacks[type] = !activeAttacks[type];
            btn.classList.toggle('active', activeAttacks[type]);
        }

        document.getElementById('sendBtn').onclick = async () => {
            if (!selectedDeviceId) return alert("Please select a device!");
            const msg = document.getElementById('messageInput').value.trim();
            if (!msg) return alert("Please enter a message!");

            const status = document.getElementById('statusMsg');
            const stepsList = document.getElementById('stepsList');
            const eduCard = document.getElementById('eduCard');

            status.style.display = 'block';
            status.className = '';
            status.textContent = 'Preparing secure transmission...';
            stepsList.innerHTML = '';
            eduCard.style.display = 'block';

            try {
                const device = devices.find(d => d.id === selectedDeviceId);

                if (typeof device.public_key_jwk === 'string') {
                    device.public_key_jwk = JSON.parse(device.public_key_jwk);
                }

                const pubKeyEnc = await CryptoUtils.importKey(
                    device.public_key_jwk.enc,
                    {name: "RSA-OAEP", hash: "SHA-256"},
                    ["wrapKey"]
                );

                addStep("Step 1: Generated 256-bit AES symmetric key.");

                let hybrid = await CryptoUtils.encryptHybrid(msg, pubKeyEnc);
                addStep("Step 2: Payload encrypted with AES. AES key wrapped with RSA-OAEP Public Key.");

                // Compute hash of the plaintext message
                const hash = await CryptoUtils.computeHash(msg);
                const hmac = await CryptoUtils.computeHMAC(msg, document.getElementById('sharedSecret').value);
                addStep("Step 3: Computed SHA-256 integrity hash & HMAC authentication tag.");

                const privBundleStr = localStorage.getItem(`priv_${device.id}`);
                if (!privBundleStr) {
                    throw new Error("Private keys not found. Please re-select the device to restore/re-generate them.");
                }

                const privBundle = JSON.parse(privBundleStr);
                const privKeySig = await CryptoUtils.importKey(
                    privBundle.sig,
                    {name: "RSA-PSS", hash: "SHA-256"},
                    ["sign"]
                );

                // FIX: signMessage now signs the raw bytes of the hash hex,
                // not the UTF-8 encoding of the hex string.
                const signature = await CryptoUtils.signMessage(hash, privKeySig);
                addStep("Step 4: Message hash signed with RSA-PSS private key (raw digest bytes) for Non-repudiation.");

                let timestamp = Date.now();
                let nonce = crypto.randomUUID();

                let payload = {
                    device_id: selectedDeviceId,
                    encrypted_message: hybrid.encryptedMessage,
                    encrypted_key: hybrid.encryptedKey,
                    iv: hybrid.iv,
                    hash: hash,
                    hmac: hmac,
                    signature: signature,
                    timestamp: timestamp,
                    nonce: nonce
                };

                if (activeAttacks.tamper) {
                    payload.encrypted_message += "XYZ";
                    addStep("<span style='color:var(--accent-red)'>ATTACK: Tampering with Encrypted Data</span>");
                }
                if (activeAttacks.expire) {
                    payload.timestamp -= (10 * 60 * 1000);
                    addStep("<span style='color:var(--accent-red)'>ATTACK: Injecting stale timestamp (10m old)</span>");
                }
                if (activeAttacks.spoof) {
                    payload.device_id = "UNKNOWN_DEVICE_666";
                    addStep("<span style='color:var(--accent-red)'>ATTACK: Spoofing device identity</span>");
                }
                if (activeAttacks.replay && lastSuccessPayload) {
                    payload = lastSuccessPayload;
                    addStep("<span style='color:var(--accent-red)'>ATTACK: Replaying previous valid payload</span>");
                }

                const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                const result = await res.json();
                if (res.ok) {
                    status.className = 'success';
                    status.textContent = "✅ " + result.message;
                    lastSuccessPayload = payload;
                } else {
                    status.className = 'error';
                    status.textContent = "❌ " + (result.message || result.error);
                }

            } catch (err) {
                console.error(err);
                status.className = 'error';
                status.textContent = "Error: " + err.message;
            }
        };

        function addStep(text) {
            const div = document.createElement('div');
            div.className = 'step';
            div.innerHTML = text;
            document.getElementById('stepsList').appendChild(div);
        }
    </script>
</body>
</html>
