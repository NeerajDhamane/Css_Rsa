<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Logs | Smart City Secure System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: rgba(23, 28, 40, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --accent-purple: #8b5cf6;
            --glass-blur: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: var(--glass-blur);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.25rem; display: flex; align-items: center; gap: 0.75rem; }
        .logo i { color: var(--accent-blue); }

        nav { display: flex; gap: 1.5rem; }
        nav a { text-decoration: none; color: var(--text-secondary); font-weight: 500; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; }
        nav a:hover, nav a.active { color: var(--text-primary); }
        nav a.active { color: var(--accent-blue); }

        main { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }

        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 1rem; backdrop-filter: var(--glass-blur); overflow: hidden; margin-bottom: 2rem; }
        .card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .card-header h2 { font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 0.75rem; }

        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-color); font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.05em; font-weight: 700; }
        td { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; color: var(--text-secondary); transition: background 0.2s; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .badge { padding: 0.25rem 0.6rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.4rem; }
        .badge-success { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .badge-error { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: var(--accent-yellow); }

        .btn-icon { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 0.5rem; border-radius: 0.4rem; transition: all 0.2s; }
        .btn-icon:hover { background: rgba(255,255,255,0.1); color: var(--accent-blue); }

        #detailOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 1.5rem; }

        .log-section { margin-bottom: 1.5rem; }
        .log-label { font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 0.5rem; display: block; }
        .log-value { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; background: rgba(0,0,0,0.3); padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border-color); word-break: break-all; }

        .verif-card { border-radius: 0.75rem; border: 1px solid var(--border-color); padding: 1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; }
        .verif-card.pass { border-left: 4px solid var(--accent-green); }
        .verif-card.fail { border-left: 4px solid var(--accent-red); }
        .verif-icon { font-size: 1.5rem; }

        #decryptSection {
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid var(--accent-blue);
            padding: 1rem;
            border-radius: 0.75rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-shield-halved"></i>
            SECURE-CITY <span style="color:var(--accent-blue)">COMM</span>
        </div>
        <nav>
            <a href="/"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="/verify.html" class="active"><i class="fas fa-list-check"></i> System Logs</a>
        </nav>
    </header>

    <main>
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-database"></i> Preserved Communication Logs</h2>
                <button class="btn-icon" onclick="fetchLogs()"><i class="fas fa-sync-alt"></i></button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Device</th>
                            <th>Timestamp</th>
                            <th>Integrity</th>
                            <th>Auth</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="logsTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="detailOverlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitle">Log Entry Details</h2>
                <button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="log-section">
                    <span class="log-label">Security Assessment</span>
                    <div id="verifResults"></div>
                </div>

                <div class="log-section" id="decryptSection" style="display:none;">
                    <span class="log-label">Confidentiality Decryption (Hybrid RSA + AES)</span>
                    <div class="log-value" id="decryptedOutput" style="border: 2px solid var(--accent-green); background: rgba(16, 185, 129, 0.05); color: var(--text-primary); font-size: 1.1rem; font-weight: 600;"></div>
                    <div id="decryptInfo" style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 0.5rem; display: flex; align-items: center; gap: 0.4rem;"></div>
                </div>

                <div class="log-section">
                    <span class="log-label">Raw Encrypted Message (Ciphertext)</span>
                    <div class="log-value" id="rawMessage"></div>
                </div>

                <div class="log-section">
                    <span class="log-label">SHA-256 Digest (Integrity)</span>
                    <div class="log-value" id="rawHash"></div>
                </div>

                <div class="log-section">
                    <span class="log-label">Digital Signature (Non-repudiation)</span>
                    <div class="log-value" id="rawSignature"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/public/js/crypto-utils.js"></script>
    <script>
        let logs = [];

        window.onload = fetchLogs;

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                logs = await res.json();
                renderLogs();
            } catch (err) {
                console.error(err);
            }
        }

        function renderLogs() {
            const body = document.getElementById('logsTableBody');
            body.innerHTML = '';

            if (logs.length === 0) {
                body.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:3rem;opacity:0.5">No logs found in database.</td></tr>';
                return;
            }

            logs.forEach(log => {
                const row = document.createElement('tr');
                const timeStr = new Date(parseInt(log.timestamp)).toLocaleTimeString();
                const isTampered = log.encrypted_message.endsWith("XYZ");

                row.innerHTML = `
                    <td style="color:var(--text-primary)">
                        <strong>${log.device_name}</strong><br>
                        <small style="opacity:0.5">${log.device_id}</small>
                    </td>
                    <td>${timeStr}</td>
                    <td><span class="badge ${!isTampered ? 'badge-success' : 'badge-error'}">
                        ${!isTampered ? '<i class="fas fa-check"></i> Intact' : '<i class="fas fa-times"></i> Tampered'}
                    </span></td>
                    <td><span class="badge badge-success"><i class="fas fa-user-check"></i> Verified</span></td>
                    <td>
                        <button class="btn-icon" onclick="viewDetails(${log.id})">
                            <i class="fas fa-eye"></i> Examine
                        </button>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        async function viewDetails(id) {
            const log = logs.find(l => l.id === id);
            if (!log) return;

            document.getElementById('modalTitle').textContent = `Log Entry #${log.id} Analysis`;
            document.getElementById('rawMessage').textContent = log.encrypted_message;
            document.getElementById('rawHash').textContent = log.hash;
            document.getElementById('rawSignature').textContent = log.signature;

            // Reset decrypted output styles each time modal opens
            const decryptedOutput = document.getElementById('decryptedOutput');
            decryptedOutput.style.borderColor = 'var(--accent-green)';
            decryptedOutput.style.color = 'var(--text-primary)';

            const verifPanel = document.getElementById('verifResults');
            verifPanel.innerHTML = '';

            verifPanel.appendChild(createVerifCard('Replay Protection', 'Nonce unique & Timestamp fresh at time of arrival.', true));

            const pubBundle = typeof log.public_key_jwk === 'string' ? JSON.parse(log.public_key_jwk) : log.public_key_jwk;

            let isSignatureValid = false;
            let sigMessage = "Verification failed.";

            const decryptSection = document.getElementById('decryptSection');
            const decryptInfo = document.getElementById('decryptInfo');

            try {
                if (pubBundle && pubBundle.sig) {
                    const privBundleStr = localStorage.getItem(`priv_${log.device_id}`);

                    if (privBundleStr) {
                        const privBundle = JSON.parse(privBundleStr);

                        // Decrypt the message using stored private encryption key
                        const privKeyEnc = await CryptoUtils.importKey(
                            privBundle.enc,
                            {name: "RSA-OAEP", hash: "SHA-256"},
                            ["decrypt", "unwrapKey"]
                        );
                        const decrypted = await CryptoUtils.decryptHybrid(
                            log.encrypted_message,
                            log.encrypted_key,
                            log.iv,
                            privKeyEnc
                        );

                        // FIX: Recompute the hash from the decrypted plaintext
                        // and verify it matches what was stored — integrity cross-check
                        const recomputedHash = await CryptoUtils.computeHash(decrypted);
                        const hashMatches = recomputedHash === log.hash;

                        // FIX: Import the public signing key from the log's own stored public_key_jwk
                        // (not the device's current key — that may have been regenerated)
                        const pubKeySig = await CryptoUtils.importKey(
                            pubBundle.sig,
                            {name: "RSA-PSS", hash: "SHA-256"},
                            ["verify"]
                        );

                        // FIX: verifySignature now uses log.hash (the stored hex digest)
                        // which is converted to raw bytes internally — matching how signMessage signed it
                        isSignatureValid = await CryptoUtils.verifySignature(log.hash, log.signature, pubKeySig);

                        if (isSignatureValid) {
                            sigMessage = "RSA-PSS Signature verified successfully.";
                        } else {
                            sigMessage = `RSA-PSS Signature INVALID! (Non-repudiation failure)${!hashMatches ? ' — Hash mismatch detected.' : ''}`;
                        }

                        decryptSection.style.display = 'block';
                        decryptedOutput.textContent = decrypted;
                        decryptInfo.innerHTML = `<i class="fas fa-key"></i> Decrypted using device private key stored in local session.`;

                    } else {
                        // No private key in session
                        sigMessage = "Private key not found in session; cannot verify signature.";
                        decryptSection.style.display = 'block';
                        decryptedOutput.style.borderColor = 'var(--accent-red)';
                        decryptedOutput.style.color = 'var(--accent-red)';
                        decryptedOutput.textContent = "[PRIVATE KEY MISSING]";
                        decryptInfo.innerHTML = `<i class="fas fa-circle-exclamation"></i> Only the device that sent this message can decrypt it. Private key was not found in this browser.`;
                    }
                }
            } catch (err) {
                console.error("Verification error:", err);
                sigMessage = "Error during verification: " + err.message;
                decryptSection.style.display = 'block';
                decryptedOutput.style.borderColor = 'var(--accent-red)';
                decryptedOutput.style.color = 'var(--accent-red)';
                decryptedOutput.textContent = "[DECRYPTION FAILED] Keys may be out of sync. Re-select device on Dashboard to regenerate.";
            }

            const isTampered = log.encrypted_message.endsWith("XYZ");
            verifPanel.appendChild(createVerifCard('Data Integrity', isTampered ? 'CRITICAL: Ciphertext tampering detected!' : 'SHA-256 Hash matches expected value.', !isTampered));
            verifPanel.appendChild(createVerifCard('Authentication', sigMessage, isSignatureValid));

            if (!localStorage.getItem(`priv_${log.device_id}`)) {
                decryptSection.style.display = 'none';
            }

            document.getElementById('detailOverlay').style.display = 'flex';
        }

        function createVerifCard(label, text, pass) {
            const div = document.createElement('div');
            div.className = `verif-card ${pass ? 'pass' : 'fail'}`;
            div.innerHTML = `
                <div class="verif-icon">${pass ? '✅' : '❌'}</div>
                <div>
                    <div style="font-weight:700; font-size:0.85rem">${label}</div>
                    <div style="font-size:0.8rem; opacity:0.7">${text}</div>
                </div>
            `;
            return div;
        }

        function closeModal() {
            document.getElementById('detailOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
